# ── SERVER ────────────────────────────────────────
server.port=${PORT:8080}

# ── DATABASE (Railway auto-fills these) ───────────
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQL_DATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── CONNECTION POOL (lower for free tier) ─────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ── CORS ──────────────────────────────────────────
spring.web.cors.allowed-origins=*

# ── LOGGING ───────────────────────────────────────
logging.level.root=WARN
logging.level.com.dpi=INFO